name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancela runs anteriores se um novo push acontecer na mesma branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Codecov OIDC tokenless precisa de id-token: write
permissions:
  contents: read
  id-token: write

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, fileinfo
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer deps
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPUnit + Clover coverage
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload PHP coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: phpunit
          fail_ci_if_error: false
          use_oidc: true

  phpunit-integration:
    name: PHPUnit Integration (MySQL real)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: guardkids_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, fileinfo, mysqli
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer deps
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPUnit Integration
        run: vendor/bin/phpunit -c phpunit-integration.xml.dist

  app-parent:
    name: app-parent (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public/app-parent
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: public/app-parent/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Vitest + lcov coverage
        run: pnpm test:coverage

      - name: Upload TS coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: public/app-parent/coverage/lcov.info
          flags: vitest
          fail_ci_if_error: false
          use_oidc: true

      - name: Type check + build
        run: pnpm build

  app-child:
    name: app-child (vitest + build + e2e + PWA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: public/app-child
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: public/app-child/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Vitest
        run: pnpm test

      - name: Type check + build (gera SW Workbox + manifest)
        run: pnpm build

      - name: Install Playwright Chromium + system deps
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e (Phase 5 wire-up)
        run: pnpm test:e2e
